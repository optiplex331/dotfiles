"$schema" = 'https://starship.rs/config-schema.json'

# 右侧提示符：显示命令耗时和环境变量
right_format = """
$cmd_duration\
$env_var
"""

# 不在提示符之间插入空行
add_newline = false

# ── 目录 ────────────────────────────────────────────────────────────────────
[directory]
truncation_length = 0        # 不截断路径长度
truncate_to_repo = false     # 不将路径截断到仓库根目录
style = 'bold #82AAFF'
read_only = " 󰌾"            # 只读目录图标

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_status]
style = 'bold #82AAFF'
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = '✘${count}'
modified = '!${count}'
untracked = '?${count}'
ahead = '⇡${count}'
behind = '⇣${count}'
staged = '+${count}'
deleted = '✘${count}'
renamed = '»${count}'

[git_commit]
tag_symbol = '  '

# ── 时间 ─────────────────────────────────────────────────────────────────────
[time]
format = '[$time]($style) '
disabled = true

# ── 环境变量：显示代理地址 ────────────────────────────────────────────────────
[env_var.all_proxy]
variable = 'all_proxy'
format = "[$env_value]($style) "
default = ''                 # 未设置时显示空字符串
style = 'bold #82AAFF'

# ── 命令耗时 ──────────────────────────────────────────────────────────────────
[cmd_duration]
format = '[$duration]($style) '

# ── 主机名（已禁用） ──────────────────────────────────────────────────────────
[hostname]
disabled = true
ssh_symbol = " "            # SSH 连接时若启用，显示此图标

# ── 用户名（已禁用） ──────────────────────────────────────────────────────────
[username]
disabled = true

# ── 包管理器（已禁用） ────────────────────────────────────────────────────────
[package]
disabled = true
symbol = "󰏗 "

# ── 操作系统图标 ──────────────────────────────────────────────────────────────
[os]
disabled = true

[aws]
symbol = " "
force_display = false
disabled = true

