# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                      YAZI 主配置文件 (yazi.toml)                           ║
# ║                  Yazi 是一个高性能的终端文件管理器                        ║
# ║                   JSON Schema: https://yazi-rs.github.io/schemas/yazi.json ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

# ═══════════════════════════════════════════════════════════════════════════
#                          📂 [MANAGER] - 文件管理器配置
# ═══════════════════════════════════════════════════════════════════════════

[manager]

# ─────────────────────────────────────────────────────────────────────────
# 布局配置：三栏窗口的宽度比例
# ─────────────────────────────────────────────────────────────────────────
# ratio = [父目录, 当前目录, 预览窗口]
# 推荐配置：
#   [ 1, 4, 4 ]  - 均衡显示（默认）
#   [ 1, 3, 5 ]  - 预览窗口更大
#   [ 0, 1, 1 ]  - 隐藏父目录
ratio = [ 1, 4, 4 ]

# ─────────────────────────────────────────────────────────────────────────
# 排序和显示方式
# ─────────────────────────────────────────────────────────────────────────

# 主排序方式
# 可选值: alphabetical / created / extension / modified / natural / size / random
sort_by = "alphabetical"

# 是否区分大小写排序 (false = 不区分)
sort_sensitive = false

# 是否反向排序 (false = 正常顺序)
sort_reverse = false

# 文件夹是否优先显示
sort_dir_first = true

# 是否使用音译排序（针对非英文文件名）
sort_translit = false

# ─────────────────────────────────────────────────────────────────────────
# 显示模式：在文件列表中显示什么信息
# ─────────────────────────────────────────────────────────────────────────
# 可选值:
#   size        - 显示文件大小（默认）
#   permissions - 显示权限信息 (drwxr-xr-x)
#   mtime       - 显示修改时间
#   owner       - 显示所有者
#   btime       - 显示创建时间
#   none        - 简化显示，仅显示文件名
linemode = "size"

# ─────────────────────────────────────────────────────────────────────────
# 隐藏文件和符号链接显示
# ─────────────────────────────────────────────────────────────────────────

# 默认显示隐藏文件 (如 .config, .bashrc 等)
# false = 隐藏 | true = 显示
show_hidden = false

# 是否显示符号链接信息
show_symlink = true

# ─────────────────────────────────────────────────────────────────────────
# 滚动和交互方式
# ─────────────────────────────────────────────────────────────────────────

# 当光标距离上下边界少于此值时自动滚动
scrolloff = 5

# 支持的鼠标事件
# 可选: "click" (点击), "scroll" (滚动), "double_click" (双击)
mouse_events = [ "click", "scroll" ]

# ─────────────────────────────────────────────────────────────────────────
# 窗口标题
# ─────────────────────────────────────────────────────────────────────────
# 支持的占位符:
#   {cwd} - 当前工作目录
#   {count} - 选中文件数
title_format = "Yazi: {cwd}"


# ═══════════════════════════════════════════════════════════════════════════
#                        👁️ [PREVIEW] - 预览窗口配置
# ═══════════════════════════════════════════════════════════════════════════

[preview]

# ─────────────────────────────────────────────────────────────────────────
# 文本预览设置
# ─────────────────────────────────────────────────────────────────────────

# 文本换行方式
# 可选: "no" (不换行) | "yes" (换行)
wrap = "no"

# 制表符宽度（空格数）
tab_size = 2

# ─────────────────────────────────────────────────────────────────────────
# 预览窗口尺寸限制
# ─────────────────────────────────────────────────────────────────────────

# 最大宽度（像素）
max_width = 600

# 最大高度（像素）
max_height = 900

# ─────────────────────────────────────────────────────────────────────────
# 图片预览配置
# ─────────────────────────────────────────────────────────────────────────

# 缓存目录（空 = 使用默认位置 ~/.cache/yazi）
cache_dir = ""

# 图片加载延迟（毫秒）- 预防性能问题
# 值越大，加载越慢但占用资源更少
image_delay = 30

# 图片缩放过滤器
# 可选: "nearest" | "box" | "triangle" (推荐) | "catmull_rom" | "lanczos3"
image_filter = "triangle"

# 图片质量（百分比）
# 75-90 比较合理，100 会很慢
image_quality = 75

# Sixel 格式支持（某些终端）
sixel_fraction = 15

# Ueberzug 配置（旧版图片预览方案）
ueberzug_scale = 1
ueberzug_offset = [ 0, 0, 0, 0 ]


# ═══════════════════════════════════════════════════════════════════════════
#                      🔓 [OPENER] - 文件打开方式定义
# ═══════════════════════════════════════════════════════════════════════════
# 定义不同的"打开方式"，在 [open.rules] 中调用

[opener]

# ─────────────────────────────────────────────────────────────────────────
# 编辑器打开 - 用文本编辑器编辑文件
# ─────────────────────────────────────────────────────────────────────────
edit = [
    # Linux/macOS - Neovim (推荐，原生集成)
    { run = 'nvim "$@"', desc = "$EDITOR", block = true, for = "unix" },
    
    # Windows - VS Code
    { run = 'code %*', orphan = true, desc = "code", for = "windows" },
    # Windows - VS Code 阻塞模式（等待编辑完成）
    { run = 'code -w %*', block = true, desc = "code (block)", for = "windows" },
]

# ─────────────────────────────────────────────────────────────────────────
# 默认打开 - 用系统默认应用打开
# ─────────────────────────────────────────────────────────────────────────
open = [
    # Linux
    { run = 'xdg-open "$1"', desc = "Open", for = "linux" },
    # macOS
    { run = 'open "$@"', desc = "Open", for = "macos" },
    # Windows
    { run = 'start "" "%1"', orphan = true, desc = "Open", for = "windows" },
]

# ─────────────────────────────────────────────────────────────────────────
# 显示文件 - 在文件管理器中显示文件所在位置
# ─────────────────────────────────────────────────────────────────────────
reveal = [
    # Linux
    { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "linux" },
    # macOS
    { run = 'open -R "$1"', desc = "Reveal", for = "macos" },
    # Windows
    { run = 'explorer /select,"%1"', orphan = true, desc = "Reveal", for = "windows" },
    # 显示 EXIF 信息（图片元数据）
    { run = '''exiftool "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show EXIF", for = "unix" },
]

# ─────────────────────────────────────────────────────────────────────────
# 解压文件
# ─────────────────────────────────────────────────────────────────────────
extract = [
    { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
    { run = 'ya pub extract --list %*', desc = "Extract here", for = "windows" },
]

# ─────────────────────────────────────────────────────────────────────────
# 播放媒体文件
# ─────────────────────────────────────────────────────────────────────────
play = [
    # 用 MPV 播放视频/音频
    { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
    { run = 'mpv --force-window %*', orphan = true, for = "windows" },
    # 显示媒体信息
    { run = '''mediainfo "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show media info", for = "unix" },
]


# ═══════════════════════════════════════════════════════════════════════════
#                      📋 [OPEN.RULES] - 文件打开规则
# ═══════════════════════════════════════════════════════════════════════════
# 根据文件类型匹配 opener 定义，优先级从上到下

[open]
rules = [
    # ─────────────────────────────────────────────────────────────────────
    # 文件夹 - 三种打开方式可选
    # ─────────────────────────────────────────────────────────────────────
    { name = "*/", use = [ "edit", "open", "reveal" ] },
    
    # ─────────────────────────────────────────────────────────────────────
    # 文本文件 - 用编辑器编辑
    # ─────────────────────────────────────────────────────────────────────
    { mime = "text/*", use = [ "edit", "reveal" ] },
    
    # ─────────────────────────────────────────────────────────────────────
    # 图片 - 用默认应用打开
    # ─────────────────────────────────────────────────────────────────────
    { mime = "image/*", use = [ "open", "reveal" ] },
    
    # ─────────────────────────────────────────────────────────────────────
    # 音视频 - 用播放器播放
    # ─────────────────────────────────────────────────────────────────────
    { mime = "{audio,video}/*", use = [ "play", "reveal" ] },
    
    # ─────────────────────────────────────────────────────────────────────
    # 压缩包 - 提供解压选项
    # ─────────────────────────────────────────────────────────────────────
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
    
    # ─────────────────────────────────────────────────────────────────────
    # 数据格式
    # ─────────────────────────────────────────────────────────────────────
    { mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
    { mime = "*/javascript", use = [ "edit", "reveal" ] },
    
    # ─────────────────────────────────────────────────────────────────────
    # 空文件
    # ─────────────────────────────────────────────────────────────────────
    { mime = "inode/empty", use = [ "edit", "reveal" ] },
    
    # ─────────────────────────────────────────────────────────────────────
    # 其他文件 - 默认打开
    # ─────────────────────────────────────────────────────────────────────
    { name = "*", use = [ "open", "reveal" ] },
]


# ═══════════════════════════════════════════════════════════════════════════
#                      ⚙️ [TASKS] - 后台任务配置
# ═══════════════════════════════════════════════════════════════════════════
# 处理文件操作的后台任务（复制、移动等）

[tasks]

# ─────────────────────────────────────────────────────────────────────────
# 并发设置
# ─────────────────────────────────────────────────────────────────────────

# 微型任务并发数（轻量级操作如 stat）
micro_workers = 10

# 宏观任务并发数（重型操作如复制、删除）
macro_workers = 10

# ─────────────────────────────────────────────────────────────────────────
# 错误处理
# ─────────────────────────────────────────────────────────────────────────

# 任务异常重试次数
bizarre_retry = 3

# ─────────────────────────────────────────────────────────────────────────
# 内存管理
# ─────────────────────────────────────────────────────────────────────────

# 图片加载分配的内存（字节）
# 536870912 = 512MB (默认值)
image_alloc = 536870912

# 图片绑定范围 [最小, 最大]
# [0, 0] 表示自动
image_bound = [ 0, 0 ]

# ─────────────────────────────────────────────────────────────────────────
# 优化选项
# ─────────────────────────────────────────────────────────────────────────

# 是否禁用预加载优化（false = 启用预加载，更快）
suppress_preload = false


# ═══════════════════════════════════════════════════════════════════════════
#                      🧩 [PLUGIN] - 插件配置
# ═══════════════════════════════════════════════════════════════════════════
# 配置文件预览、识别、加载的插件系统

[plugin]

# ─────────────────────────────────────────────────────────────────────────
# Fetchers - 文件类型检测（获取 MIME 类型）
# ─────────────────────────────────────────────────────────────────────────
# 在不知道文件类型时执行，优先级 high 先执行

fetchers = [
    # 用 mime 插件检测文件类型
    { id = "mime", name = "*", run = "mime", if = "!mime", prio = "high" },
]

# ─────────────────────────────────────────────────────────────────────────
# Spotters - 快速预览（显示概览缩略图）
# ─────────────────────────────────────────────────────────────────────────

spotters = [
    # 文件夹快速预览
    { name = "*/", run = "folder" },
    # 代码文件高亮预览
    { mime = "text/*", run = "code" },
    { mime = "*/{xml,javascript,wine-extension-ini}", run = "code" },
    # 图片缩略图
    { mime = "image/{avif,hei?,jxl,svg+xml}", run = "magick" },
    { mime = "image/*", run = "image" },
    # 视频缩略图
    { mime = "video/*", run = "video" },
    # 其他文件类型预览
    { name = "*", run = "file" },
]

# ─────────────────────────────────────────────────────────────────────────
# Preloaders - 后台预加载（加速预览）
# ─────────────────────────────────────────────────────────────────────────

preloaders = [
    # 特殊格式图片预加载
    { mime = "image/{avif,hei?,jxl,svg+xml}", run = "magick" },
    { mime = "image/*", run = "image" },
    # 视频预加载
    { mime = "video/*", run = "video" },
    # PDF 预加载
    { mime = "application/pdf", run = "pdf" },
    # 字体预加载
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
]

# ─────────────────────────────────────────────────────────────────────────
# Previewers - 详细预览（文件内容显示）
# ─────────────────────────────────────────────────────────────────────────

previewers = [
    # 文件夹内容预览
    { name = "*/", run = "folder", sync = true },
    
    # 代码文件语法高亮
    { mime = "text/*", run = "code" },
    { mime = "*/{xml,javascript,wine-extension-ini}", run = "code" },
    
    # JSON 格式化预览
    { mime = "application/{json,ndjson}", run = "json" },
    
    # 图片预览
    { mime = "image/{avif,hei?,jxl,svg+xml}", run = "magick" },
    { mime = "image/*", run = "image" },
    
    # 视频预览
    { mime = "video/*", run = "video" },
    
    # PDF 预览
    { mime = "application/pdf", run = "pdf" },
    
    # 压缩包内容预览
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
    { mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
    { name = "*.{AppImage,appimage}", run = "archive" },
    
    # 虚拟磁盘/磁盘镜像
    { mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
    { mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
    { name = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
    
    # 字体预览
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
    
    # 空文件
    { mime = "inode/empty", run = "empty" },
    
    # 其他文件的通用预览
    { name = "*", run = "file" },
]


# ═══════════════════════════════════════════════════════════════════════════
#                      ⌨️ [INPUT] - 输入框配置
# ═══════════════════════════════════════════════════════════════════════════
# 用于命名、重命名、搜索等输入框的设置

[input]

# ─────────────────────────────────────────────────────────────────────────
# 光标设置
# ─────────────────────────────────────────────────────────────────────────

# 光标是否闪烁
cursor_blink = false

# ─────────────────────────────────────────────────────────────────────────
# 切换目录 (cd) 对话框
# ─────────────────────────────────────────────────────────────────────────

cd_title = "Change directory:"
cd_origin = "top-center"    # 对话框位置：top-center/top-left/top-right/center/...
cd_offset = [ 0, 2, 50, 3 ] # [x, y, width, height] 偏移量

# ─────────────────────────────────────────────────────────────────────────
# 创建文件/文件夹对话框
# ─────────────────────────────────────────────────────────────────────────

create_title = [ "Create:", "Create (dir):" ]  # 两个提示：文件 vs 目录
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# ─────────────────────────────────────────────────────────────────────────
# 重命名对话框
# ─────────────────────────────────────────────────────────────────────────

rename_title = "Rename:"
rename_origin = "hovered"    # 在光标位置出现
rename_offset = [ 0, 1, 50, 3 ]

# ─────────────────────────────────────────────────────────────────────────
# 过滤对话框
# ─────────────────────────────────────────────────────────────────────────

filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# ─────────────────────────────────────────────────────────────────────────
# 查找对话框
# ─────────────────────────────────────────────────────────────────────────

find_title = [ "Find next:", "Find previous:" ]  # 向前/向后查找
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# ─────────────────────────────────────────────────────────────────────────
# 搜索对话框
# ─────────────────────────────────────────────────────────────────────────

search_title = "Search via {n}:"  # {n} = 搜索工具名称
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# ─────────────────────────────────────────────────────────────────────────
# 运行 Shell 命令对话框
# ─────────────────────────────────────────────────────────────────────────

shell_title = [ "Shell:", "Shell (block):" ]  # 异步 vs 阻塞
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]


# ═══════════════════════════════════════════════════════════════════════════
#                      ✅ [CONFIRM] - 确认对话框配置
# ═══════════════════════════════════════════════════════════════════════════
# 删除、覆盖等危险操作的确认对话框设置

[confirm]

# ─────────────────────────────────────────────────────────────────────────
# 移动到垃圾箱
# ─────────────────────────────────────────────────────────────────────────

trash_title = "Trash {n} selected file{s}?"  # {n}=数量, {s}=单复数
trash_origin = "center"
trash_offset = [ 0, 0, 70, 20 ]

# ─────────────────────────────────────────────────────────────────────────
# 永久删除
# ─────────────────────────────────────────────────────────────────────────

delete_title = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [ 0, 0, 70, 20 ]

# ─────────────────────────────────────────────────────────────────────────
# 覆盖现有文件
# ─────────────────────────────────────────────────────────────────────────

overwrite_title = "Overwrite file?"
overwrite_content = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]

# ─────────────────────────────────────────────────────────────────────────
# 退出时有任务在运行
# ─────────────────────────────────────────────────────────────────────────

quit_title = "Quit?"
quit_content = "The following task is still running, are you sure you want to quit?"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]


# ═══════════════════════════════════════════════════════════════════════════
#                      🎯 [PICK] - 选择器对话框配置
# ═══════════════════════════════════════════════════════════════════════════
# 用于打开方式选择、快捷命令选择等

[pick]

open_title = "Open with:"
open_origin = "hovered"      # 在光标位置出现
open_offset = [ 0, 1, 50, 7 ]


# ═══════════════════════════════════════════════════════════════════════════
#                      ❓ [WHICH] - 帮助提示配置
# ═══════════════════════════════════════════════════════════════════════════
# 快捷键帮助和命令提示的显示方式

[which]

# 排序方式：none/command/desc
sort_by = "none"

# 排序时是否区分大小写
sort_sensitive = false

# 是否反向排序
sort_reverse = false

# 是否使用音译排序
sort_translit = false

# ═══════════════════════════════════════════════════════════════════════════
# 📝 配置使用提示：
# ═══════════════════════════════════════════════════════════════════════════
#
# 1. 修改后保存，重启 Yazi 生效
# 2. 配置文件位置：
#    - Linux/macOS: ~/.config/yazi/yazi.toml
#    - Windows: %APPDATA%\yazi\config\yazi.toml
#
# 3. 常见定制：
#    - 改变编辑器：修改 [opener] 的 edit 定义
#    - 改变排序：修改 sort_by 和 sort_dir_first
#    - 改变显示：修改 linemode 和 show_hidden
#    - 改变布局：修改 ratio
#
# 4. 性能优化：
#    - 如果卡顿，增加 image_delay 和 image_quality
#    - 减少 micro_workers 和 macro_workers
#
# ═══════════════════════════════════════════════════════════════════════════
