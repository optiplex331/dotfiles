# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                       YAZI 主题配置文件 (theme.toml)                       ║
# ║                  控制 Yazi 的颜色、样式和视觉外观                        ║
# ║             JSON Schema: https://yazi-rs.github.io/schemas/theme.json    ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# vim:fileencoding=utf-8:foldmethod=marker

# ═══════════════════════════════════════════════════════════════════════════
#                      🎨 [FLAVOR] - 主题风格选择
# ═══════════════════════════════════════════════════════════════════════════
# 根据终端的深/浅色主题自动切换
#
# 支持的主题包括：
#   - Catppuccin (latte, frappe, macchiato, mocha)
#   - Dracula, Nord, Solarized, Tokyo Night, One Dark
#   - 或其他自定义主题
#
# 如果不指定，Yazi 会根据系统主题自动选择

[flavor]

# 深色模式（当系统设为深色时使用）
# 空值 = 使用默认 theme-dark.toml
dark = ""

# 浅色模式（当系统设为浅色时使用）
# 空值 = 使用默认 theme-light.toml
light = ""

# ═══════════════════════════════════════════════════════════════════════════
#                   🖥️ [MANAGER] - 文件管理器配色
# ═══════════════════════════════════════════════════════════════════════════

[manager]

# 当前工作目录路径的颜色
# fg = 字体颜色, bg = 背景色, bold = 加粗, italic = 斜体, underline = 下划线
cwd = { fg = "cyan" }

# ─────────────────────────────────────────────────────────────────────────
# 文件项样式
# ─────────────────────────────────────────────────────────────────────────

# 光标所在文件的样式（默认：反色显示）
# reversed = true : 前景色和背景色交换
hovered = { reversed = true }

# 预览窗口中被高亮的文件
preview_hovered = { underline = true }

# ─────────────────────────────────────────────────────────────────────────
# 查找和搜索相关样式
# ─────────────────────────────────────────────────────────────────────────

# 查找操作时的关键词高亮
# bold = 加粗, italic = 斜体, underline = 下划线
find_keyword = { fg = "yellow", bold = true, italic = true, underline = true }

# 查找结果的位置提示（如 "1/10"）
find_position = { fg = "magenta", bg = "reset", bold = true, italic = true }

# ─────────────────────────────────────────────────────────────────────────
# 标记样式（复制、剪切、选中等状态指示）
# ─────────────────────────────────────────────────────────────────────────

# 已复制的文件标记
marker_copied = { fg = "lightgreen", bg = "lightgreen" }

# 已剪切的文件标记
marker_cut = { fg = "lightred", bg = "lightred" }

# 已标记的文件标记（用于批量操作）
marker_marked = { fg = "lightcyan", bg = "lightcyan" }

# 已选中的文件标记（视觉模式）
marker_selected = { fg = "lightyellow", bg = "lightyellow" }

# ─────────────────────────────────────────────────────────────────────────
# 标签页样式
# ─────────────────────────────────────────────────────────────────────────

# 活跃标签页（当前浏览的标签）
tab_active = { reversed = true }

# 非活跃标签页（其他标签）
tab_inactive = {}

# 标签页宽度（字符数）
tab_width = 1

# ─────────────────────────────────────────────────────────────────────────
# 操作计数样式（显示复制/剪切/选中的文件数量）
# ─────────────────────────────────────────────────────────────────────────

# 已复制文件的计数显示
count_copied = { fg = "white", bg = "green" }

# 已剪切文件的计数显示
count_cut = { fg = "white", bg = "red" }

# 已选中文件的计数显示
count_selected = { fg = "white", bg = "yellow" }

# ─────────────────────────────────────────────────────────────────────────
# 边框样式
# ─────────────────────────────────────────────────────────────────────────

# 用什么符号绘制边框
# 常见选项: "│", "▏", "|"
border_symbol = "│"

# 边框的颜色
border_style = { fg = "gray" }

# ─────────────────────────────────────────────────────────────────────────
# 代码高亮主题
# ─────────────────────────────────────────────────────────────────────────

# 文本文件预览时使用的语法高亮主题
# 支持 Syntect 的所有内置主题，空值 = 自动选择
syntect_theme = ""


# ═══════════════════════════════════════════════════════════════════════════
#                      🎛️ [MODE] - 模式指示样式
# ═══════════════════════════════════════════════════════════════════════════
# 显示当前操作模式的视觉反馈

[mode]

# 普通模式样式
normal_main = { bg = "blue", bold = true }    # 主要指示
normal_alt = { fg = "blue", bg = "gray" }     # 替代指示

# 选择模式（visual_mode）样式
select_main = { bg = "red", bold = true }
select_alt = { fg = "red", bg = "gray" }

# 未设置模式（unsupported 状态）样式
unset_main = { bg = "red", bold = true }
unset_alt = { fg = "red", bg = "gray" }


# ═══════════════════════════════════════════════════════════════════════════
#                      ⏳ [STATUS] - 状态栏配色
# ═══════════════════════════════════════════════════════════════════════════

[status]

# ─────────────────────────────────────────────────────────────────────────
# 进度提示
# ─────────────────────────────────────────────────────────────────────────

# 进度条标签（如 "Copying"）
separator_open = ""
separator_close = ""

progress_label = { bold = true }

# 正常进度条颜色（如复制中）
progress_normal = { fg = "blue", bg = "black" }

# 错误进度条颜色（如复制失败）
progress_error = { fg = "red", bg = "black" }

# ─────────────────────────────────────────────────────────────────────────
# 权限显示样式（如 drwxr-xr-x）
# ─────────────────────────────────────────────────────────────────────────

# 分隔符（权限各部分之间）
perm_sep = { fg = "darkgray" }

# 文件类型标识 (d/l/-)
perm_type = { fg = "green" }

# 读权限 (r)
perm_read = { fg = "yellow" }

# 写权限 (w)
perm_write = { fg = "red" }

# 执行权限 (x)
perm_exec = { fg = "cyan" }


# ═══════════════════════════════════════════════════════════════════════════
#                      🎯 [PICK] - 选择器对话框样式
# ═══════════════════════════════════════════════════════════════════════════
# 用于选择打开方式、快速命令等

[pick]

border = { fg = "blue" }          # 对话框边框颜色
active = { fg = "magenta", bold = true }  # 活跃项样式
inactive = {}                     # 非活跃项样式


# ═══════════════════════════════════════════════════════════════════════════
#                      ✏️ [INPUT] - 输入框样式
# ═══════════════════════════════════════════════════════════════════════════
# 用于文件名输入、搜索等

[input]

border = { fg = "blue" }          # 输入框边框
title = {}                        # 标题文本
value = {}                        # 输入内容
selected = { reversed = true }    # 选中文本


# ═══════════════════════════════════════════════════════════════════════════
#                      ✅ [CONFIRM] - 确认对话框样式
# ═══════════════════════════════════════════════════════════════════════════

[confirm]

border = { fg = "blue" }          # 对话框边框
title = { fg = "blue" }           # 标题
content = {}                      # 内容文本
list = {}                         # 选项列表
btn_yes = { reversed = true }     # Yes 按钮
btn_no = {}                       # No 按钮
# 按钮标签文本
btn_labels = [ "  [Y]es  ", "  (N)o  " ]


# ═══════════════════════════════════════════════════════════════════════════
#                      🔍 [COMPLETION] - 自动完成菜单样式
# ═══════════════════════════════════════════════════════════════════════════

[completion]

border = { fg = "blue" }          # 菜单边框
active = { reversed = true }      # 选中项
inactive = {}                     # 未选中项

# 菜单中的图标
icon_file = ""                    # 文件图标
icon_folder = ""                  # 文件夹图标
icon_command = ""                 # 命令图标


# ═══════════════════════════════════════════════════════════════════════════
#                      📋 [TASKS] - 后台任务窗口样式
# ═══════════════════════════════════════════════════════════════════════════

[tasks]

border = { fg = "blue" }          # 窗口边框
title = {}                        # 标题
hovered = { fg = "magenta", underline = true }  # 悬停任务


# ═══════════════════════════════════════════════════════════════════════════
#                      ❓ [WHICH] - 快捷键提示窗口
# ═══════════════════════════════════════════════════════════════════════════

[which]

cols = 3                          # 显示列数
mask = { bg = "black" }           # 半透明遮罩
cand = { fg = "lightcyan" }       # 候选快捷键
rest = { fg = "darkgray" }        # 其他文本
desc = { fg = "lightmagenta" }    # 快捷键说明
separator = "  "                  # 列分隔符
separator_style = { fg = "darkgray" }


# ═══════════════════════════════════════════════════════════════════════════
#                      📚 [HELP] - 帮助窗口样式
# ═══════════════════════════════════════════════════════════════════════════

[help]

on = { fg = "cyan" }              # 快捷键
run = { fg = "magenta" }          # 执行的命令
desc = {}                         # 描述文本
hovered = { reversed = true, bold = true }  # 悬停项
footer = { fg = "black", bg = "white" }     # 页脚


# ═══════════════════════════════════════════════════════════════════════════
#                      🔔 [NOTIFY] - 通知消息样式
# ═══════════════════════════════════════════════════════════════════════════

[notify]

title_info = { fg = "green" }     # 信息通知标题
title_warn = { fg = "yellow" }    # 警告通知标题
title_error = { fg = "red" }      # 错误通知标题

# 通知图标
icon_info = ""                    # 信息图标
icon_warn = ""                    # 警告图标
icon_error = ""                   # 错误图标


# ═══════════════════════════════════════════════════════════════════════════
#                    📂 [FILETYPE] - 文件类型着色规则
# ═══════════════════════════════════════════════════════════════════════════
# 根据文件类型设置不同的颜色

[filetype]

rules = [
    # ─────────────────────────────────────────────────────────────────────
    # 媒体文件
    # ─────────────────────────────────────────────────────────────────────
    
    # 图片：黄色
    { mime = "image/*", fg = "yellow" },

    # 音视频：紫红色
    { mime = "{audio,video}/*", fg = "magenta" },

    # ─────────────────────────────────────────────────────────────────────
    # 压缩包：红色
    # ─────────────────────────────────────────────────────────────────────
    
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "red" },

    # ─────────────────────────────────────────────────────────────────────
    # 文档：青色
    # ─────────────────────────────────────────────────────────────────────
    
    { mime = "application/{pdf,doc,rtf}", fg = "cyan" },

    # ─────────────────────────────────────────────────────────────────────
    # 特殊文件
    # ─────────────────────────────────────────────────────────────────────
    
    # 孤立文件（损坏的符号链接）：红色背景
    { name = "*", is = "orphan", bg = "red" },
    
    # 可执行文件：绿色
    { name = "*", is = "exec", fg = "green" },

    # 虚拟文件：红色背景
    { name = "*", is = "dummy", bg = "red" },
    { name = "*/", is = "dummy", bg = "red" },

    # ─────────────────────────────────────────────────────────────────────
    # 文件夹：蓝色（默认）
    # ─────────────────────────────────────────────────────────────────────
    
    { name = "*/", fg = "blue" }
]


# ═══════════════════════════════════════════════════════════════════════════
#                    🎯 [ICON] - 文件和文件夹图标配置
# ═══════════════════════════════════════════════════════════════════════════
# 使用 Nerd Font 中的符号来显示文件和文件夹图标

[icon]

# ─────────────────────────────────────────────────────────────────────────
# 通过 glob 模式匹配的图标（根据文件名）
# ─────────────────────────────────────────────────────────────────────────

globs = []

# ─────────────────────────────────────────────────────────────────────────
# 目录图标
# ─────────────────────────────────────────────────────────────────────────

dirs = [
    { name = ".config", text = "" },      # 配置目录
    { name = ".git", text = "" },         # Git 目录
    { name = "Desktop", text = "" },      # 桌面
    { name = "Development", text = "" },  # 开发目录
    { name = "Documents", text = "" },    # 文档
    { name = "Downloads", text = "" },    # 下载
    { name = "Library", text = "" },      # 库文件
    { name = "Movies", text = "" },       # 视频
    { name = "Music", text = "" },        # 音乐
    { name = "Pictures", text = "" },     # 图片
    { name = "Public", text = "" },       # 公共
    { name = "Templates", text = "" },    # 模板
    { name = "Videos", text = "" },       # 视频
]

# ─────────────────────────────────────────────────────────────────────────
# 文件类型图标（部分示例，完整列表见原文件）
# ─────────────────────────────────────────────────────────────────────────

# 文件类型格式：
# { name = "*.ext", text = "图标", fg = "#颜色码" }

files = [
    # 代码文件
    { name = "*.py", text = "", fg = "#ffbc03" },      # Python
    { name = "*.js", text = "", fg = "#f1e05a" },      # JavaScript
    { name = "*.ts", text = "", fg = "#519aba" },      # TypeScript
    { name = "*.rs", text = "", fg = "#dea584" },      # Rust
    { name = "*.c", text = "", fg = "#555555" },       # C
    { name = "*.cpp", text = "", fg = "#f34b7d" },     # C++
    { name = "*.h", text = "", fg = "#555555" },       # Header
    { name = "*.go", text = "", fg = "#00add8" },      # Go
    { name = "*.java", text = "", fg = "#b07219" },    # Java
    
    # Web 相关
    { name = "*.html", text = "", fg = "#e34c26" },    # HTML
    { name = "*.css", text = "", fg = "#563d7c" },     # CSS
    { name = "*.scss", text = "", fg = "#f55385" },    # SCSS
    { name = "*.json", text = "", fg = "#cbcb41" },    # JSON
    { name = "*.xml", text = "󰗀", fg = "#e37933" },   # XML
    
    # 配置文件
    { name = "*.toml", text = "", fg = "#9c4221" },    # TOML
    { name = "*.yaml", text = "", fg = "#6d8086" },    # YAML
    { name = "*.yml", text = "", fg = "#6d8086" },     # YAML
    { name = "*.sh", text = "", fg = "#4d5a5e" },      # Shell
    { name = "*.bash", text = "", fg = "#4d5a5e" },    # Bash
    { name = "Dockerfile", text = "", fg = "#2496ed" },# Docker
    { name = "Makefile", text = "", fg = "#6d8086" },  # Makefile
    
    # 文档
    { name = "*.md", text = "", fg = "#dddddd" },      # Markdown
    { name = "*.pdf", text = "", fg = "#b30b00" },     # PDF
    { name = "*.txt", text = "󰈙", fg = "#89e051" },   # Text
    
    # 媒体
    { name = "*.png", text = "", fg = "#a074c4" },     # PNG
    { name = "*.jpg", text = "", fg = "#a074c4" },     # JPEG
    { name = "*.gif", text = "", fg = "#a074c4" },     # GIF
    { name = "*.mp3", text = "", fg = "#00afff" },     # MP3
    { name = "*.mp4", text = "", fg = "#fd971f" },     # MP4
    
    # 压缩
    { name = "*.zip", text = "", fg = "#eca517" },     # ZIP
    { name = "*.tar", text = "", fg = "#eca517" },     # TAR
    { name = "*.gz", text = "", fg = "#eca517" },      # GZIP
    { name = "*.rar", text = "", fg = "#eca517" },     # RAR
]

# ─────────────────────────────────────────────────────────────────────────
# 条件图标（根据文件属性）
# ─────────────────────────────────────────────────────────────────────────

conds = [
    # 孤立文件（损坏的符号链接）
    { if = "orphan", text = "" },
    
    # 符号链接
    { if = "link", text = "" },
    
    # 块设备
    { if = "block", text = "" },
    
    # 字符设备
    { if = "char", text = "" },
    
    # 管道（FIFO）
    { if = "fifo", text = "" },
    
    # 套接字
    { if = "sock", text = "" },
    
    # Sticky 权限
    { if = "sticky", text = "" },
    
    # 虚拟文件
    { if = "dummy", text = "" },

    # 文件夹（备选方案）
    { if = "dir", text = "󰉋" },
    
    # 可执行文件
    { if = "exec", text = "" },
    
    # 普通文件
    { if = "!dir", text = "󰈔" },
]


# ═══════════════════════════════════════════════════════════════════════════
# 📝 配置使用提示：
# ═══════════════════════════════════════════════════════════════════════════
#
# 1. 颜色值格式：
#    - 颜色名：black, red, green, yellow, blue, magenta, cyan, white
#    - 亮色名：lightred, lightgreen, lightyellow 等
#    - 深色名：darkgray, darkred 等
#    - 十六进制：#FF00FF（需要 256 色或真彩色终端）
#    - reset：重置为默认颜色
#
# 2. 样式属性：
#    - fg = 前景色（字体颜色）
#    - bg = 背景色
#    - bold = 加粗（true/false）
#    - dim = 暗淡（true/false）
#    - italic = 斜体（true/false）
#    - underline = 下划线（true/false）
#    - reversed = 反色（true/false）
#    - blink = 闪烁（true/false）
#
# 3. 修改颜色步骤：
#    - 找到要改的部分（如 cwd = { fg = "cyan" }）
#    - 改变 fg/bg 的值
#    - 保存并重启 Yazi
#
# 4. 常见定制：
#    - 改变当前目录颜色：修改 cwd
#    - 改变文件夹颜色：修改 filetype 中的 { name = "*/", fg = ... }
#    - 改变特定文件类型颜色：在 filetype.files 中添加规则
#
# 5. 性能提示：
#    - 不要在 icon 中添加太多规则（会影响加载速度）
#    - 优先使用简单的颜色而非十六进制代码
#
# 6. Nerd Font 图标资源：
#    - https://www.nerdfonts.com/cheat-sheet
#    - 复制图标，粘贴到 text 值即可
#
# ═══════════════════════════════════════════════════════════════════════════
